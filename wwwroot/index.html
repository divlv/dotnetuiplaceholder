<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI App Placeholder</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --surface: #fffdf8;
      --ink: #22201b;
      --accent: #0f7c90;
      --accent-strong: #0a5c6b;
      --border: #d8cec1;
      --muted: #6b6358;
      --shadow: 0 18px 40px rgba(34, 32, 27, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 124, 144, 0.16), transparent 34%),
        linear-gradient(180deg, #f8f2e8 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      font: inherit;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 10px 18px rgba(15, 124, 144, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: progress;
      opacity: 0.78;
      transform: none;
    }

    .hint {
      font-size: 0.95rem;
    }

    .result {
      margin-top: 24px;
      min-height: 140px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #fbf7f0;
      padding: 20px;
    }

    .result-label {
      display: block;
      margin-bottom: 10px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.96rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .error {
      color: #8e1d1d;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>This is UI App</h1>
    <p>
      This page is served by the mirror UI App. Use the button below to fetch live data
      from the mirror API App through Azure Front Door Standard.
    </p>

    <div class="actions">
      <button id="load-data" type="button">Get Data from API App</button>
      <span class="hint">Target: <code>https://m1.caservices.visiondsm.com/application/</code></span>
    </div>

    <section class="result" aria-live="polite">
      <span class="result-label">API Response</span>
      <pre id="result">Click the button to load data.</pre>
    </section>
  </main>

  <script>
    const button = document.getElementById("load-data");
    const result = document.getElementById("result");

    button.addEventListener("click", async () => {
      button.disabled = true;
      result.classList.remove("error");
      result.textContent = "Loading data from API App...";

      try {
        const response = await fetch("/api/data", {
          method: "GET",
          headers: {
            "Accept": "application/json"
          }
        });

        const payload = await response.json();

        if (!response.ok || !payload.ok) {
          result.classList.add("error");
          result.textContent = [
            `Request failed with status ${payload.statusCode ?? response.status}.`,
            payload.reasonPhrase ?? "Unknown error",
            "",
            payload.data ?? ""
          ].join("\n");
          return;
        }

        result.textContent = payload.data;
      } catch (error) {
        result.classList.add("error");
        result.textContent = `Unexpected error: ${error instanceof Error ? error.message : String(error)}`;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
